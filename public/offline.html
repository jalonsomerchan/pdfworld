<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="robots" content="noindex,follow" />
    <title>Sin conexión · FácilPDF</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        width: min(100%, 520px);
        padding: clamp(24px, 5vw, 40px);
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 24px 70px rgb(15 23 42 / .12);
      }
      h1 { margin: 0 0 12px; font-size: clamp(1.8rem, 6vw, 2.7rem); letter-spacing: -.055em; }
      p { margin: 0 0 18px; color: #475569; line-height: 1.6; }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 999px;
        background: #f0523d;
        color: #fff;
        font-weight: 900;
        text-decoration: none;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #f8fafc; }
        main { border-color: #1e293b; background: #0f172a; }
        p { color: #cbd5e1; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>FácilPDF no puede cargar esta página ahora mismo. Algunas herramientas visitadas previamente pueden seguir funcionando offline, pero los documentos del usuario no se guardan en la caché.</p>
      <a href="/es">Volver al inicio</a>
    </main>
  </body>
</html>
